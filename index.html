/* =====================================================================
   セッションMD パーサ（transcriber形式 → 構造）
   ===================================================================== */
function parseSession(md){
  const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n/);
  const fm = {};
  if(fmMatch){ let key=null;
    fmMatch[1].split("\n").forEach(line=>{
      const m=line.match(/^([A-Za-z_][\w]*):\s*(.*)$/);
      if(m){ key=m[1]; const v=m[2].trim(); if(v===""){ fm[key]=[]; } else { fm[key]=v.replace(/^["']|["']$/g,""); key=null; } }
      else { const li=line.match(/^\s*-\s+(.*)$/); if(li && key && Array.isArray(fm[key])) fm[key].push(li[1].trim().replace(/^["']|["']$/g,"")); }
    });
  }
  const body = fmMatch ? md.slice(fmMatch[0].length) : md;
  const section = (name)=>{ const m = body.match(new RegExp("##\\s+"+name+"[^\\n]*\\n([\\s\\S]*?)(?=\\n##\\s|$)")); return m?m[1].trim():""; };
  const bullets = (t)=> t.split("\n").filter(l=>l.trim().startsWith("- ")).map(l=>l.replace(/^\s*-\s+/,""));
  // 会話履歴：すべての「### 時刻 話者」をターンとして抽出。発言内の ## 見出し・表・> コールアウト・--- は本文として保持する
  let convo = body;
  const ci = body.indexOf("## 会話履歴");
  if(ci>=0){ const after=body.slice(ci); const nl=after.indexOf("\n"); convo = nl<0?"":after.slice(nl+1); }
  const turns=[]; let cur=null;
  convo.split("\n").forEach(line=>{
    const hm=line.match(/^###\s+(\d{1,2}:\d{2}(?::\d{2})?)\s+(.+?)\s*$/);
    if(hm){ if(cur) turns.push(cur); const who=hm[2];
      let speaker="claude"; if(/妻/.test(who))speaker="wife"; else if(/夫/.test(who))speaker="husband"; else if(/claude/i.test(who))speaker="claude";
      cur={ time:hm[1], speaker,
        name: speaker==="wife"?"妻":speaker==="husband"?"夫":"Claude",
        emoji: speaker==="wife"?"👩":speaker==="husband"?"👨":"🤖", lines:[] }; }
    else if(cur){ cur.lines.push(line); }
  });
  if(cur) turns.push(cur);
  turns.forEach(t=>{ let b=t.lines.join("\n").replace(/^\n+|\n+$/g,"");
    if(t.speaker!=="claude"){ b=b.split("\n").map(l=>l.replace(/^>\s?/,"")).join("\n").trim(); }
    t.body=b; delete t.lines; });
  return { fm, summary:bullets(section("サマリ")), turns };
}
function sessionDate(md){ const m=md.match(/^date:\s*(.+)$/m); return m?m[1].trim():""; }
function latestSessionDate(sessions){ return (sessions||[]).map(sessionDate).filter(Boolean).sort().slice(-1)[0]||""; }
function extractPhase(progressMd){ const m=(progressMd||"").match(/現在のフェーズ[：:]\s*\*{0,2}([^\*\n]+?)\*{0,2}\s*$/m); return m?m[1].trim():""; }

/* 各アダプタが返した apps を仕上げ（phase / updatedAt を付与） */
function finalizeModel(model){
  (model.apps||[]).forEach(a=>{
    if(!a.phase) a.phase = extractPhase(a.progress);
    a.updatedAt = latestSessionDate(a.sessions);
    if(!a.name) a.name = a.dir||a.id;
  });
  return model;
}

/* =====================================================================
   Drive アダプタ（GIS トークン + Drive REST v3）※ 本番URLで有効
   ===================================================================== */
let _driveToken = null;
function loadScript(src){ return new Promise((res,rej)=>{ if([...document.scripts].some(s=>s.src===src))return res(); const s=document.createElement("script"); s.src=src; s.onload=res; s.onerror=()=>rej(new Error("script load failed: "+src)); document.head.appendChild(s); }); }
async function driveConnect(){
  if(!CONFIG.googleClientId) throw new Error("NO_CLIENT_ID");
  await loadScript("https://accounts.google.com/gsi/client");
  return new Promise((resolve,reject)=>{
    try{
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.googleClientId, scope: CONFIG.driveScope,
        callback: (r)=>{ if(r&&r.access_token){_driveToken=r.access_token; resolve();} else reject(new Error("AUTH_FAILED")); },
      });
      tc.requestAccessToken({prompt: _driveToken?"":"consent"});
    }catch(e){ reject(e); }
  });
}
async function driveApi(path){ const r=await fetch("https://www.googleapis.com/drive/v3/"+path,{headers:{Authorization:"Bearer "+_driveToken}}); if(!r.ok) throw new Error("Drive API "+r.status); return r; }
async function driveList(q){
  let files=[], pageToken="";
  do{
    const params=new URLSearchParams({q, fields:"nextPageToken,files(id,name,mimeType,modifiedTime)", pageSize:"200"});
    if(pageToken) params.set("pageToken",pageToken);
    const data=await (await driveApi("files?"+params.toString())).json();
    files=files.concat(data.files||[]); pageToken=data.nextPageToken||"";
  }while(pageToken);
  return files;
}
async function driveText(id){ return await (await driveApi("files/"+id+"?alt=media")).text(); }
const FOLDER="mimeType='application/vnd.google-apps.folder'";
async function driveBuildModel(){
  const roots=await driveList(`name='${CONFIG.driveRootName}' and ${FOLDER} and trashed=false`);
  if(!roots.length) throw new Error("ROOT_NOT_FOUND");
  const rootId=roots[0].id; _driveRootId=rootId;
  const top=await driveList(`'${rootId}' in parents and ${FOLDER} and trashed=false`);
  const apps=[]; let global={skillsMatrix:null,glossary:"",reports:[]};
  for(const f of top){
    if(f.name==="_global"){
      const gf=await driveList(`'${f.id}' in parents and trashed=false`);
      for(const g of gf){
        if(g.name==="glossary.md") global.glossary=await driveText(g.id);
        else if(g.name==="skills-matrix.json"){ try{global.skillsMatrix=JSON.parse(await driveText(g.id));}catch(e){global.skillsMatrix=null;} }
        else if(g.mimeType.endsWith("folder")&&g.name==="reports"){
          const rf=await driveList(`'${g.id}' in parents and trashed=false`);
          for(const r of rf.filter(x=>x.name.endsWith(".md"))) global.reports.push({name:r.name, md:await driveText(r.id)});
        }
      }
      continue;
    }
    if(f.name.startsWith("_")) continue; // _dashboard 等
    const children=await driveList(`'${f.id}' in parents and trashed=false`);
    const byName=(n)=>children.find(c=>c.name===n);
    const app={ id:f.name, dir:f.name, docs:[], sessions:[], progress:"", learnings:"", insights:"" };
    const pg=byName("progress.md"), lr=byName("learnings.md"), ins=byName("insights.md");
    if(pg) app.progress=await driveText(pg.id);
    if(lr) app.learnings=await driveText(lr.id);
    if(ins) app.insights=await driveText(ins.id);
    const docsF=children.find(c=>c.name==="docs"&&c.mimeType.endsWith("folder"));
    if(docsF){
      const dc=await driveList(`'${docsF.id}' in parents and trashed=false`);
      for(const d of dc.filter(x=>x.name.endsWith(".md")).sort((a,b)=>a.name.localeCompare(b.name)))
        app.docs.push({id:d.name, title:d.name, file:"docs/"+d.name, md:await driveText(d.id)});
      for(const sub of dc.filter(x=>x.mimeType.endsWith("folder"))){
        const sd=(await driveList(`'${sub.id}' in parents and trashed=false`)).filter(x=>x.name.endsWith(".md")).sort((a,b)=>a.name.localeCompare(b.name));
        for(const d of sd) app.docs.push({id:sub.name+"/"+d.name, title:sub.name+"/"+d.name, file:"docs/"+sub.name+"/"+d.name, md:await driveText(d.id)});
      }
    }
    const sessF=children.find(c=>c.name==="sessions-readable"&&c.mimeType.endsWith("folder"))
              ||children.find(c=>c.name==="sessions"&&c.mimeType.endsWith("folder"));
    if(sessF){ const sf=(await driveList(`'${sessF.id}' in parents and trashed=false`)).filter(x=>x.name.endsWith(".md")).sort((a,b)=>b.name.localeCompare(a.name));
      for(const s of sf) app.sessions.push(await driveText(s.id)); }
    if(!app.progress){ const ph=app.docs.find(d=>/_phase\.md$/.test(d.file)); if(ph) app.progress=ph.md; }
    apps.push(app);
  }
  return finalizeModel({apps, global});
}

/* =====================================================================
   ローカル アダプタ（File System Access API）※ デスクトップChromium限定
   ===================================================================== */
function fsSupported(){ return typeof window!=="undefined" && "showDirectoryPicker" in window; }
async function readDirMd(dirHandle){ const out=[]; for await (const [name,h] of dirHandle.entries()){ if(h.kind==="file"&&name.endsWith(".md")) out.push({name, text:await (await h.getFile()).text()}); } return out; }
async function getSub(dirHandle,name){ try{ return await dirHandle.getDirectoryHandle(name); }catch(e){ return null; } }
async function getFileText(dirHandle,name){ try{ return await (await (await dirHandle.getFileHandle(name)).getFile()).text(); }catch(e){ return ""; } }
async function localBuildModel(){
  if(!fsSupported()) throw new Error("FS_UNSUPPORTED");
  const root=await window.showDirectoryPicker();
  // 「.claude と claude-workspace を含むホーム」を選んでも、claude-workspace を直接選んでも動くようにする
  const ws=(await getSub(root,"claude-workspace")) || root;
  const apps=[];
  for await (const [name,h] of ws.entries()){
    if(h.kind!=="directory"||name.startsWith(".")) continue;
    const appDir=h;
    const app={ id:name, dir:name, docs:[], sessions:[], progress:"", learnings:"", insights:"" };
    const cl=await getSub(appDir,".claude-local");
    if(cl){
      app.progress=await getFileText(cl,"progress.md");
      app.learnings=await getFileText(cl,"learnings.md");
      app.insights=await getFileText(cl,"insights.md");
      const sr=await getSub(cl,"sessions-readable");
      if(sr){ const m=await readDirMd(sr); m.sort((a,b)=>b.name.localeCompare(a.name)); app.sessions=m.map(x=>x.text); }
    }
    const docs=await getSub(appDir,"docs");
    if(docs){
      const m=await readDirMd(docs); m.sort((a,b)=>a.name.localeCompare(b.name));
      app.docs=m.map(x=>({id:x.name,title:x.name,file:"docs/"+x.name,md:x.text}));
      for await (const [sn,sh] of docs.entries()){
        if(sh.kind==="directory"){ const sm=await readDirMd(sh); sm.sort((a,b)=>a.name.localeCompare(b.name));
          for(const x of sm) app.docs.push({id:sn+"/"+x.name,title:sn+"/"+x.name,file:"docs/"+sn+"/"+x.name,md:x.text}); }
      }
    }
    if(!app.progress){ const ph=app.docs.find(d=>/_phase\.md$/.test(d.file)); if(ph) app.progress=ph.md; }
    if(app.progress||app.docs.length||app.sessions.length||app.learnings) apps.push(app);
  }
  // グローバル（~/.claude/learning-logs）：ホームを選んでいれば読める
  let global={skillsMatrix:null, glossary:"", reports:[], _localHint:true};
  const dotClaude=(await getSub(root,".claude")) || (ws!==root ? await getSub(ws,".claude") : null);
  const ll=dotClaude ? await getSub(dotClaude,"learning-logs") : null;
  if(ll){
    global._localHint=false;
    try{ const sm=await getFileText(ll,"skills-matrix.json"); if(sm) global.skillsMatrix=JSON.parse(sm); }catch(e){}
    global.glossary=await getFileText(ll,"glossary.md");
    const rep=await getSub(ll,"reports");
    if(rep){ const m=await readDirMd(rep); m.sort((a,b)=>b.name.localeCompare(a.name)); global.reports=m.map(x=>({name:x.name, md:x.text})); }
  }
  return finalizeModel({apps, global});
}

/* Markdown 描画は DOMPurify でサニタイズ（未ロード時は生描画にフォールバック） */
function mdParse(s){ const h=marked["parse"](s||""); try{ return (typeof DOMPurify!=="undefined"&&DOMPurify.sanitize)?DOMPurify.sanitize(h):h; }catch(e){ return h; } }
function mdInline(s){ const h=marked["parseInline"](s||""); try{ return (typeof DOMPurify!=="undefined"&&DOMPurify.sanitize)?DOMPurify.sanitize(h):h; }catch(e){ return h; } }

function sortedApps(){
  let arr=[...(state.model?.apps||[])];
  if(state.search){ const q=state.search.toLowerCase(); arr=arr.filter(a=>(a.name+" "+a.dir).toLowerCase().includes(q)); }
  if(state.pinOnly) arr=arr.filter(a=>pins.has(a.id));
  const cmp={ recent:(a,b)=>(b.updatedAt||"").localeCompare(a.updatedAt||""), name:(a,b)=>(a.name||"").localeCompare(b.name||"","ja"),
    phase:(a,b)=>(PHASE_ORDER.indexOf(a.phase)+1||99)-(PHASE_ORDER.indexOf(b.phase)+1||99) }[state.sort];
  arr.sort(cmp);
  arr.sort((a,b)=>(pins.has(b.id)?1:0)-(pins.has(a.id)?1:0)); // ピンを上に
  return arr;
}

/* ---------- メモ（v2: ローカル即時保存 + Drive一元同期） ---------- */
let _driveRootId=null;
function noteFileName(key){ return key.replace(/[^\w.\-]+/g,"_")+".md"; }
async function driveFindOrCreateFolder(name, parentId){
  const f=await driveList(`name='${name}' and ${FOLDER} and '${parentId}' in parents and trashed=false`);
  if(f.length) return f[0].id;
  const r=await fetch("https://www.googleapis.com/drive/v3/files",{method:"POST",headers:{Authorization:"Bearer "+_driveToken,"Content-Type":"application/json"},body:JSON.stringify({name,mimeType:"application/vnd.google-apps.folder",parents:[parentId]})});
  return (await r.json()).id;
}
async function driveDashboardFolder(){
  if(!_driveRootId){ const r=await driveList(`name='${CONFIG.driveRootName}' and ${FOLDER} and trashed=false`); if(r.length)_driveRootId=r[0].id; }
  if(!_driveRootId) throw new Error("no root");
  return await driveFindOrCreateFolder("_dashboard", _driveRootId);
}
async function driveNotesFolder(){ const dash=await driveDashboardFolder(); return await driveFindOrCreateFolder("notes", dash); }
async function driveLoadGuide(){
  const dash=await driveDashboardFolder();
  const files=await driveList(`'${dash}' in parents and trashed=false`);
  const g=files.find(f=>f.name==="SETUP-GUIDE.md")||files.find(f=>f.name==="guide.md");
  const cj=files.find(f=>f.name==="commands.json");
  const md=g?await driveText(g.id):"";
  let cmds=[]; if(cj){ try{ cmds=JSON.parse(await driveText(cj.id)); }catch(e){} }
  return {md, cmds};
}
async function loadGuideFromDrive(){
  _guideLoading=true; _guideErr=""; renderGuide();
  try{ if(!_driveToken) await driveConnect(); const r=await driveLoadGuide(); GUIDE={md:r.md, cmds:r.cmds, at:new Date().toISOString()}; try{store.set("guideCache",GUIDE);}catch(e){} }
  catch(e){ _guideErr=(e&&e.message)||"取得に失敗しました"; }
  _guideLoading=false; renderGuide();
}
async function driveFindNote(key){ const folder=await driveNotesFolder(); const f=await driveList(`name='${noteFileName(key)}' and '${folder}' in parents and trashed=false`); return f.length?f[0].id:null; }
async function driveSaveNote(key,text){
  const folder=await driveNotesFolder(); const existing=await driveFindNote(key);
  if(existing){ await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing}?uploadType=media`,{method:"PATCH",headers:{Authorization:"Bearer "+_driveToken,"Content-Type":"text/markdown"},body:text}); }
  else{ const b="b"+Math.random().toString(36).slice(2); const meta={name:noteFileName(key),parents:[folder]};
    const body=`--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${b}\r\nContent-Type: text/markdown\r\n\r\n${text}\r\n--${b}--`;
    await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{method:"POST",headers:{Authorization:"Bearer "+_driveToken,"Content-Type":"multipart/related; boundary="+b},body}); }
}
async function notesLoad(key){
  const local=store.get("note:"+key)||"";
  if(_driveToken){ try{ const id=await driveFindNote(key); if(id){ const txt=await driveText(id); store.set("note:"+key,txt); return txt; } }catch(e){} }
  return local;
}
const _memoTimers={};
function notesSave(key,text){ store.set("note:"+key,text); if(_driveToken){ if(_memoTimers[key])clearTimeout(_memoTimers[key]); _memoTimers[key]=setTimeout(()=>{ driveSaveNote(key,text).catch(()=>{}); },800); } }

function toggleMemo(){ state.memoOpen=!state.memoOpen; render(); }
function memoKey(){
  const a=state.appId; if(state.view!=="app"||!a) return null;
  if(state.tab==="sessions"){ if(state.openSession===null) return null; const app=currentApp(); const fm=parseSession(app.sessions[state.openSession]).fm; return `${a}::sess::${fm.session_id||("idx"+state.openSession)}`; }
  if(state.tab==="docs"){ return `${a}::doc::${state.docId}`; }
  return `${a}::${state.tab}`;
}
function bindMemoInput(key){
  const ta=document.getElementById("memoTa"); if(!ta) return;
  ta.addEventListener("input", e=>{ const tag=document.getElementById("memoTag"); if(tag)tag.textContent="…";
    if(_memoTimers["_ui"])clearTimeout(_memoTimers["_ui"]);
    _memoTimers["_ui"]=setTimeout(()=>{ notesSave(key,e.target.value); const t=document.getElementById("memoTag"); if(t){t.textContent="✓ 保存"; setTimeout(()=>{ if(t&&t.textContent==="✓ 保存")t.textContent=""; },1500);} },400); });
  if(_driveToken){ notesLoad(key).then(txt=>{ const t2=document.getElementById("memoTa"); if(t2&&document.activeElement!==t2&&txt&&txt!==t2.value) t2.value=txt; }).catch(()=>{}); }
}

  if(!hasContent){

      : "ガイドとコマンド一覧は、公開ページには含めず <b>Google Drive の <code>ClaudeLearning/_dashboard/</code></b> から読み込みます（あなただけが見られます）。";

  const phl = state.gtab==="cmd" ? "コマンドを検索…" : "ガイド内を検索…";
  const searchBox = `<input class="gsearch" type="search" placeholder="🔍 ${phl}" value="${esc(state.gsearch)}" oninput="onGSearch(this.value)">`;
  if(state.gtab==="cmd"){
    const q=state.gsearch.toLowerCase();
    const list=(GUIDE.cmds||[]).filter(cm=>!q || ((cm.name||"")+" "+(cm.desc||"")).toLowerCase().includes(q));
    const cards = list.length ? list.map(cm=>{
      let ds=cm.desc||"", us=""; const mi=ds.indexOf("使い方:"); if(mi>=0){ us=ds.slice(mi); ds=ds.slice(0,mi).trim(); }

    }).join("") : `<div class="empty">該当するコマンドがありません。</div>`;
    c.innerHTML = statusBar + searchBox + `<div>${cards}</div>`; restoreGSearchFocus(); return;
  }
  const md = GUIDE.md || "（ガイド本文が見つかりません。_dashboard/SETUP-GUIDE.md を配置してください）";

  const toc = q ? "" : `<div class="gtoc">`+parts.map((p,i)=>{ const m=p.match(/^##\s+(.+)/); return m?`<a href="#" onclick="jumpGuide(${i});return false;">${esc(m[1].trim())}</a>`:""; }).join("")+`</div>`;
  const secs = parts.map((p,i)=> (!q || p.toLowerCase().includes(q)) ? `<section id="gsec-${i}">${mdParse(p)}</section>` : "").filter(Boolean);
  const body = secs.length ? secs.join('<hr style="border:0;border-top:1px solid var(--line);margin:22px 0">') : `<div class="empty">一致する項目がありません。</div>`;
  c.innerHTML = statusBar + searchBox + toc + `<div class="card pad md">${body}</div>`; restoreGSearchFocus();
}

let _noteTimer=null;
function renderNote(c){
  const KEY="global::scratch";
  const saved = store.get("note:"+KEY) || "";
  if(state.notePreview){
    c.innerHTML = `<div class="noteed"><div class="notebar"><span>このPC＋Drive（接続時）に自動保存</span><button class="toggle" onclick="toggleNotePv()">編集に戻る</button></div><div class="notepv md">${mdParse(saved||"（まだ何も書かれていません）")}</div></div>`;
    return;
  }
  c.innerHTML = `<div class="noteed">
    <div class="notebar"><span>このPC＋Drive（接続時）に自動保存${_driveToken?"（Drive 同期中）":""}</span><span class="savetag" id="saveTag"></span><button class="toggle" onclick="toggleNotePv()">プレビュー</button></div>
    <textarea class="noteta" id="noteTa" placeholder="例）開発環境の起動手順&#10;1. ターミナルを開く&#10;2. claude を起動&#10;3. /start で新規プロジェクト&#10;&#10;Markdown で自由に書けます。入力は自動保存されます。">${esc(saved)}</textarea>
  </div>`;
  const ta=document.getElementById("noteTa");
  if(ta) ta.addEventListener("input", e=>{
    const v=e.target.value; const tag=document.getElementById("saveTag"); if(tag) tag.textContent="…";
    if(_noteTimer) clearTimeout(_noteTimer);
    _noteTimer=setTimeout(()=>{ notesSave(KEY, v); const t=document.getElementById("saveTag"); if(t){ t.textContent="✓ 保存しました"; setTimeout(()=>{ if(t&&t.textContent==="✓ 保存しました") t.textContent=""; },1600); } },400);
  });
  if(_driveToken) notesLoad(KEY).then(txt=>{ const t2=document.getElementById("noteTa"); if(t2&&document.activeElement!==t2&&txt&&txt!==t2.value) t2.value=txt; }).catch(()=>{});
}

function render(){
  setSrcButtons(); applySection();
  if(state.section==="guide"){ renderGuide(); return; }
  renderNotice(); renderPathHint(); renderCtrls(); renderApplist(); renderTabs(); renderContent();
}

/* ---------- 起動 ---------- */
(function init(){
  try{ const gc=store.get("guideCache"); if(gc&&typeof gc==="object") GUIDE=gc; }catch(e){}
  setSourceMode("sample");
})();
</script>
